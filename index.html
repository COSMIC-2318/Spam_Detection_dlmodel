<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Spam Detection</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; max-width: 600px; margin: auto; background-color: #f9f9f9;}
        textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box;}
        button { background-color: #007AFF; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; background-color: #fff; border: 1px solid #ddd; display: none;}
        .spam { color: #D8000C; background-color: #FFBABA; border-color: #D8000C; }
        .ham { color: #4F8A10; background-color: #DFF2BF; border-color: #4F8A10; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Transformer Inference Engine</h2>
    <p style="text-align: center; color: #555;">Paste the email or message below to test the live model.</p>

    <form id="spamForm">
        <textarea id="messageInput" rows="6" placeholder="Paste the sophisticated phishing attempt here..."></textarea><br>
        <button type="button" onclick="analyzeMessage()">Scan for Spam</button>
    </form>

    <div id="resultDisplay" class="result-box"></div>

    <script>
        async function analyzeMessage() {
            const rawText = document.getElementById("messageInput").value;
            const display = document.getElementById("resultDisplay");
            
            if (!rawText.trim()) {
                alert("Please enter some text to analyze.");
                return;
            }

            // Show processing state
            display.style.display = "block";
            display.className = "result-box"; 
            display.innerText = "Running neural network inference...";

            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: rawText }) 
                });

                if (!response.ok) throw new Error(`Server Error: ${response.status}`);

                const data = await response.json();
                
                // Update UI based on verdict
                display.innerText = "Verdict: " + data.prediction;
                if (data.prediction === "SPAM") {
                    display.className = "result-box spam";
                } else {
                    display.className = "result-box ham";
                }

            } catch (error) {
                display.innerText = "Connection Failed. Ensure the FastAPI server is running.";
                display.className = "result-box spam";
                console.error(error);
            }
        }
    </script>

</body>
</html>
